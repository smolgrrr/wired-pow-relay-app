manifestVersion: 1
id: smolgrrr-wired-pow-relay
category: social
name: Wired Admin
icon: https://raw.githubusercontent.com/smolgrrr/wired-admin/main/smolgrrr-wired-pow-relay/icon.png
version: "0.2.4"
tagline: Admin console for Wired relay, feed, and moderation
description: >-
  Wired Admin runs a strfry Nostr relay behind a lightweight gateway that
  enforces NIP-13 proof-of-work before events reach the relay database. It also
  includes a local console for relay health, feed snapshot monitoring, and
  moderation actions used by Wired clients.

developer: smolgrrr
website: https://www.getwired.app/
dependencies: []
repo: https://github.com/smolgrrr/wired-admin
support: https://github.com/smolgrrr/wired-admin/issues
port: 3000
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  Keeps the Umbrel console and moderation management local-only while allowing
  public hostnames to serve only relay traffic, feed snapshots, and moderation
  manifests. Adds public-host protection for Vercel preview and Tor onion
  hostnames.
